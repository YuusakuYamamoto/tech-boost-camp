name: Terraform Apply

on:
  push:
    branches:
      - 'deployment/infra/**'
    paths:
      - 'terraform/**/*.tf'
      - 'terraform/**/*.tfvars'
      - 'terraform/.terraform.lock.hcl'
      - '.github/workflows/terraform-apply.yml'

# 並列 apply を防止(state lock の二重防止)
# cancel-in-progress: false にすることで後続ジョブはキャンセルせずキューイング
concurrency:
  group: terraform-apply
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # GitHub OIDC JWT の取得に必要

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_region: ${{ vars.OCI_REGION }}
      TF_VAR_tenancy_id: ${{ vars.OCI_TENANCY_OCID }}
      TF_VAR_compartment_id: ${{ vars.OCI_COMPARTMENT_OCID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        # terraform_version を指定しないことで .terraform-version を自動参照

      - name: Exchange GitHub OIDC token for OCI UPST
        run: |
          set -euo pipefail

          # 1. 一時 RSA 鍵ペアを生成（UPST の Proof-of-Possession 用）
          mkdir -p "$HOME/.oci"
          PRIVATE_KEY_FILE="$HOME/.oci/session-key.pem"
          PUBLIC_KEY_FILE="$HOME/.oci/session-key-public.pem"
          openssl genrsa -out "$PRIVATE_KEY_FILE" 2048 2>/dev/null
          openssl rsa -pubout -in "$PRIVATE_KEY_FILE" -out "$PUBLIC_KEY_FILE" 2>/dev/null
          chmod 600 "$PRIVATE_KEY_FILE"

          PUBLIC_KEY=$(cat "$PUBLIC_KEY_FILE" | tr -d '\n')

          # 2. GitHub OIDC JWT を取得
          GITHUB_JWT=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${{ vars.OCI_DOMAIN_URL }}" | jq -r '.value')

          if [ -z "$GITHUB_JWT" ] || [ "$GITHUB_JWT" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi
          echo "GitHub OIDC token obtained successfully"

          # 3. OCI Token Exchange: GitHub JWT → UPST
          CLIENT_CREDENTIALS=$(echo -n "${{ vars.OCI_CLIENT_ID }}:${{ secrets.OCI_CLIENT_SECRET }}" | base64 -w 0)

          RESPONSE=$(curl -s -X POST \
            "${{ vars.OCI_DOMAIN_URL }}/oauth2/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "Authorization: Basic ${CLIENT_CREDENTIALS}" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            -d "subject_token=${GITHUB_JWT}" \
            -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" \
            -d "requested_token_type=urn:oci:token-type:oci-upst" \
            --data-urlencode "public_key=${PUBLIC_KEY}")

          UPST=$(echo "$RESPONSE" | jq -r '.access_token')
          TOKEN_TYPE=$(echo "$RESPONSE" | jq -r '.token_type')

          if [ -z "$UPST" ] || [ "$UPST" = "null" ]; then
            ERROR_DESC=$(echo "$RESPONSE" | jq -r '.error_description // .error // "Unknown error"')
            echo "::error::Token exchange failed: ${ERROR_DESC}"
            exit 1
          fi
          echo "OCI UPST obtained successfully (token_type: ${TOKEN_TYPE})"

          # 4. UPST をファイルに保存
          UPST_FILE="$HOME/.oci/upst-token"
          echo "$UPST" > "$UPST_FILE"
          chmod 600 "$UPST_FILE"

          # 5. ~/.oci/config をセッショントークン認証モードで生成
          {
            echo "[TBCAMP_TERRAFORM]"
            echo "tenancy=${{ vars.OCI_TENANCY_OCID }}"
            echo "region=${{ vars.OCI_REGION }}"
            echo "auth=security_token"
            echo "security_token_file=${UPST_FILE}"
            echo "key_file=${PRIVATE_KEY_FILE}"
          } > "$HOME/.oci/config"
          chmod 600 "$HOME/.oci/config"

          echo "OCI config written with security_token auth"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="namespace=${{ vars.OCI_NAMESPACE }}" \
            -backend-config="config_file_profile=TBCAMP_TERRAFORM"

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Terraform apply failed on deployment/infra/main"
